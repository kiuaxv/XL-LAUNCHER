name: Build APK with Direct Gradle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Install Gradle
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gradle
      
      - name: Clean project
        run: gradle clean
      
      - name: Build Debug APK
        run: gradle assembleDebug
      
      - name: Build Release APK
        run: gradle assembleRelease
      
      - name: List APK files
        run: find . -name "*.apk" -type f
      
      - name: Get version
        id: version
        run: echo "version=$(date +%Y.%m.%d_%H%M%S)" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ steps.version.outputs.version }}
          name: XL-LAUNCHER - ${{ steps.version.outputs.version }}
          body: |
            # XL-LAUNCHER APK Release
            
            Build completed successfully!
            
            ## Installation
            - Download the APK
            - Enable unknown sources on Android 6.0+
            - Install and launch
          files: |
            app/build/outputs/apk/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
