name: Fix Gradle Wrapper - Simple

on:
  workflow_dispatch:

jobs:
  fix-gradle:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle
      
      - name: Remove old gradle wrapper
        run: |
          rm -rf gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
          rm -f gradlew gradlew.bat 2>/dev/null || true
      
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.1.0
      
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Test gradlew
        run: ./gradlew --version
      
      - name: Commit changes
        run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Fix: Regenerate Gradle wrapper"
          git push
