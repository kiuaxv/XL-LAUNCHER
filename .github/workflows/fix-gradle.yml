name: Fix Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Remove old gradle wrapper
        run: |
          rm -rf gradle/wrapper/gradle-wrapper.jar
          rm -f gradlew gradlew.bat
      
      - name: Generate new gradle wrapper
        run: gradle wrapper --gradle-version 8.1.0
      
      - name: Verify gradle works
        run: ./gradlew --version
      
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add gradlew gradlew.bat gradle/wrapper/
          git commit -m "Fix: Regenerate Gradle wrapper"
          git push origin main
