name: Fix and Regenerate Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  fix-gradle:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Download Gradle
        run: |
          cd ~
          wget -q https://services.gradle.org/distributions/gradle-8.1.0-bin.zip
          unzip -q gradle-8.1.0-bin.zip
          export PATH=$PATH:~/gradle-8.1.0/bin
          gradle --version
      
      - name: Remove corrupted gradle files
        run: |
          rm -rf gradle/wrapper/gradle-wrapper.jar
          rm -f gradlew gradlew.bat
          rm -rf .gradle
      
      - name: Generate new gradle wrapper
        run: |
          export PATH=$PATH:~/gradle-8.1.0/bin
          gradle wrapper --gradle-version 8.1.0
          chmod +x gradlew
      
      - name: Verify new gradlew works
        run: ./gradlew --version
      
      - name: Configure git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
      
      - name: Commit and push fixed gradle
        run: |
          git add gradlew gradlew.bat gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties
          git commit -m "Fix: Regenerate Gradle wrapper - resolve ClassNotFoundException"
          git push origin main
      
      - name: Success message
        run: echo "✅ Gradle wrapper fixed! APK build workflow should now work."
