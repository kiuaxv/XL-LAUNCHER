name: Build APK and Create Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Verify Gradle Wrapper
        run: |
          ls -la ./gradlew
          file ./gradlew
          head -5 ./gradlew

      - name: Clean Gradle Cache
        run: |
          rm -rf ~/.gradle/wrapper
          rm -rf .gradle

      - name: Display Gradle Version
        run: ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug -x lint --no-daemon -i

      - name: Build Release APK
        run: ./gradlew assembleRelease -x lint --no-daemon -i

      - name: Get build version
        id: version
        run: |
          echo "version=$(date +%Y.%m.%d_%H%M%S)" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: List APK files
        run: find app/build/outputs/apk -name "*.apk" -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ steps.version.outputs.version }}
          name: XL-LAUNCHER Build - ${{ steps.version.outputs.date }}
          body: |
            # XL-LAUNCHER APK Build Release
            
            **Build Date:** ${{ steps.version.outputs.date }}
            **Build Time:** ${{ steps.version.outputs.version }}
            
            ## Installation
            1. Download the APK
            2. Enable "Unknown Sources" in Android settings
            3. Install on your device (Android 6.0+)
            
            ## Features
            - 🎮 Minecraft Java Launcher
            - 👤 Multi-Account Support
            - 🛍️ Smart Store
            - 🤖 XAI Assistant
            
            ---
            *Auto-built with GitHub Actions*
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
