name: Build APK and Create Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '8.0'

      - name: Make gradlew executable
        run: chmod +x ./gradlew || true

      - name: Verify Gradle / Wrapper
        run: |
          echo "-- java --"
          java -version || true
          echo "-- gradle (installed) --"
          gradle --version || true
          echo "-- gradle wrapper files --"
          ls -la ./gradle/wrapper || true
          ls -la ./gradlew || true

      - name: Download open-source launcher and Minecraft client
        run: |
          set -e
          mkdir -p app/libs app/libs/minecraft

          echo "Attempting to download latest PojavLauncher APK (public release assets)..."
          POJAV_URL=$(curl -s https://api.github.com/repos/PojavLauncherTeam/PojavLauncher/releases/latest | python3 -c "import sys,json; j=json.load(sys.stdin); assets=j.get('assets',[]); urls=[a['browser_download_url'] for a in assets if a.get('name','').endswith('.apk')]; print(urls[0] if urls else '')")
          if [ -n "$POJAV_URL" ]; then
            echo "Found Pojav URL: $POJAV_URL"
            curl -L -o app/libs/pojavlauncher.apk "$POJAV_URL" || echo "Failed to download PojavLauncher APK";
          else
            echo "PojavLauncher APK not found via releases; skipping.";
          fi

          echo "Downloading Minecraft client using Mojang version manifest (latest release)..."
          MANIFEST_JSON=$(curl -s https://launchermeta.mojang.com/mc/game/version_manifest.json)
          MC_VERSION=$(python3 - <<'PY'
import sys, json
m=json.load(sys.stdin)
print(m['latest']['release'])
PY
 <<<$MANIFEST_JSON)
          echo "Minecraft release version: $MC_VERSION"
          VERSION_URL=$(python3 - <<'PY'
import sys, json
m=json.load(sys.stdin)
v='$MC_VERSION'
for it in m['versions']:
    if it['id']==v:
        print(it['url'])
        break
PY
 <<<$MANIFEST_JSON)
          if [ -n "$VERSION_URL" ]; then
            CLIENT_URL=$(curl -s "$VERSION_URL" | python3 -c "import sys,json; j=json.load(sys.stdin); print(j['downloads']['client']['url'])")
            if [ -n "$CLIENT_URL" ]; then
              echo "Downloading Minecraft client jar from $CLIENT_URL"
              curl -L -o app/libs/minecraft-client-${MC_VERSION}.jar "$CLIENT_URL" || echo "Failed to download client jar";
            else
              echo "Client URL not found for version $MC_VERSION";
            fi
          else
            echo "Version metadata URL not found for $MC_VERSION";
          fi

          echo "Listing app/libs contents:"
          ls -la app/libs || true

      - name: Clean Gradle Cache
        run: |
          rm -rf .gradle || true

      - name: Display Gradle Version
        run: gradle --version

      - name: Build Debug APK
        run: gradle clean assembleDebug -x lint --no-daemon -i

      - name: Build Release APK
        run: gradle assembleRelease -x lint --no-daemon -i

      - name: Get build version
        id: version
        run: |
          echo "version=$(date +%Y.%m.%d_%H%M%S)" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: List APK files
        run: find app/build/outputs/apk -name "*.apk" -type f || true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ steps.version.outputs.version }}
          name: XL-LAUNCHER Build - ${{ steps.version.outputs.date }}
          body: |
            # XL-LAUNCHER APK Build Release
            
            **Build Date:** ${{ steps.version.outputs.date }}
            **Build Time:** ${{ steps.version.outputs.version }}
            
            ## Installation
            1. Download the APK
            2. Enable "Unknown Sources" in Android settings
            3. Install on your device (Android 6.0+)
            
            ## Features
            - 🎮 Minecraft Java Launcher
            - 👤 Multi-Account Support
            - 🛍️ Smart Store
            - 🤖 XAI Assistant
            
            ---
            *Auto-built with GitHub Actions*
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
